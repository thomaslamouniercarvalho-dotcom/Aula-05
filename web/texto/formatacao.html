<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formatacao</title>
</head>
<body>
    <p>eu sou um texto <strong>importante</strong></p>
    <hr>
    <p>texto em <em>italico</em>.</p>
    <hr>
    <p>texto em <b>negrito</b>.</p>
    <hr>
    <p>outro <i>italico</i>.</p>
    <hr>
    <marquee behavior="" direction="right">
        <img src="https://img.pokemondb.net/artwork/large/squirtle.jpg" alt="">
        <img src="https://archives.bulbagarden.net/media/upload/thumb/2/27/0004Charmander.png/800px-0004Charmander.png" alt="">
        <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/001.png" alt="">
        
    </marquee>
    <hr>
    <u>texto sublinhado</u>
    <hr>
    <mark>texto destacado</mark>
    <hr>
    <small>texto menor</small>
    <hr>
    <del>texto removido</del>
    <hr>
    <ins>texto inserido</ins>
    <hr>
    <p>H <sub>2</sub>O</p>
    <p>10 <sup>2</sup></p>


</body>
</html>
